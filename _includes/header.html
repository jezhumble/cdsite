<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta charset="utf-8">
  <title>{{ page.title }} - {{ site.name }}</title>
  <meta name="viewport" content="width=device-width">
  <link rel="shortcut icon" type="image/ico" href="{{ site.baseurl }}/assets/favicons/favicon.ico" />
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicons/favicon.png" />
  <link rel="apple-touch-icon-precomposed" href="{{ site.baseurl }}/assets/favicons/cd-center-57.png" />
  <link rel="apple-touch-icon-precomposed" sizes="72x72" href="{{ site.baseurl }}/assets/favicons/cd-center-72.png" />
  <link rel="apple-touch-icon-precomposed" sizes="114x114" href="{{ site.baseurl }}/assets/favicons/cd-center-114.png" />
  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ site.baseurl }}/assets/favicons/cd-center-144.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="{{ site.baseurl }}/assets/favicons/cd-center-192.png" />
  <link href="//cdn-images.mailchimp.com/embedcode/slim-10_7.css" rel="stylesheet" type="text/css">
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:400,700%7COpen+Sans:400,400italic,600' rel='stylesheet' type='text/css' />
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css" type='text/css' />{% for style in site.styles %}
  <link rel="stylesheet" href="{{ site.baseurl }}/{{ style }}" type='text/css' />{% endfor %}{% for style in page.styles %}
  <link rel="stylesheet" href="{{ site.baseurl }}/{{ style }}" type='text/css' />{% endfor %}

    <script src="{{ site.baseurl }}/assets/js/html5shiv.js"></script>

</head>
